<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sklar Furniture AI Event Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #189ad3 0%, #0d7aad 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
        }

        .main-title {
            text-align: center;
            color: #189ad3;
            margin-bottom: 25px;
            font-size: clamp(2rem, 7vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 2px;
        }

        .event-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            padding: 20px;
            background: #f7f7f7;
            border-radius: 15px;
        }

        .profile-photo {
            width: clamp(100px, 20vw, 150px);
            height: clamp(100px, 20vw, 150px);
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #189ad3;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .event-info {
            text-align: left;
            max-width: 500px;
        }

        .presenter {
            color: #858585;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .event-title {
            color: #232323;
            font-size: clamp(1.2rem, 3.5vw, 1.8rem);
            font-weight: 700;
            line-height: 1.3;
        }

        @media (max-width: 480px) {
            .event-header {
                flex-direction: column;
                text-align: center;
            }

            .event-info {
                text-align: center;
            }
        }

        .countdown {
            text-align: center;
            margin: 20px 0;
            padding: 25px 15px;
            background: linear-gradient(135deg, #189ad3 0%, #0d7aad 100%);
            border-radius: 15px;
            color: white;
        }

        .countdown h2 {
            margin-bottom: 20px;
            font-size: clamp(1.3rem, 4vw, 2rem);
        }

        .timer {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .time-unit {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            min-width: 80px;
            flex: 1 1 auto;
            max-width: 120px;
        }

        .time-value {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: bold;
            display: block;
        }

        .time-label {
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: #f7f7f7;
            padding: 20px 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: clamp(2rem, 5vw, 2.5rem);
            font-weight: bold;
            color: #189ad3;
        }

        .stat-label {
            color: #858585;
            margin-top: 5px;
            font-size: clamp(0.85rem, 2vw, 1rem);
        }

        .chart-container {
            position: relative;
            height: 350px;
            margin: 25px 0;
        }

        .leaderboard {
            margin-top: 25px;
        }

        .leaderboard h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #232323;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
        }

        .leader-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: #f7f7f7;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .leader-item:hover {
            transform: translateX(5px);
            background: #e8f6fc;
        }

        .leader-name {
            font-weight: 600;
            color: #232323;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
        }

        .leader-count {
            font-size: clamp(1.2rem, 3.5vw, 1.5rem);
            font-weight: bold;
            color: #189ad3;
        }

        .leader-percentage {
            color: #858585;
            margin-left: 10px;
            font-size: clamp(0.85rem, 2vw, 1rem);
        }

        .rank {
            font-size: 1.2em;
            font-weight: bold;
            color: #999;
            margin-right: 15px;
        }

        .medal {
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            margin-right: 10px;
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }

            .timer {
                gap: 10px;
            }

            .time-unit {
                min-width: 70px;
                padding: 12px 8px;
            }

            .chart-container {
                height: 300px;
            }

            .leader-item {
                padding: 12px;
                flex-wrap: wrap;
            }

            .stats {
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .container {
                border-radius: 15px;
            }

            .countdown {
                padding: 20px 10px;
            }

            .chart-container {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">SKLAR FURNITURE</h1>
        <div class="event-header">
            <img src="edmund-photo.png" alt="Edmund Bogen" class="profile-photo">
            <div class="event-info">
                <p class="presenter">Edmund Bogen presents:</p>
                <p class="event-title">"The Future of AI in Sales and Real Estate"</p>
            </div>
        </div>

        <div class="countdown">
            <h2>⏰ Event Countdown</h2>
            <div class="timer">
                <div class="time-unit">
                    <span class="time-value" id="days">0</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="hours">0</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="minutes">0</span>
                    <span class="time-label">Minutes</span>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="seconds">0</span>
                    <span class="time-label">Seconds</span>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="total-attendees">88</div>
                <div class="stat-label">Total Attendees</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">4</div>
                <div class="stat-label">Hosts</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="days-remaining">0</div>
                <div class="stat-label">Days Until Event</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="attendeeChart"></canvas>
        </div>

        <div class="leaderboard">
            <h3>📊 Host Leaderboard</h3>
            <div id="leaderboard-items"></div>
        </div>
    </div>

    <script>
        // Event date: October 8, 2025 at 11:00 AM Eastern Time
        const eventDate = new Date('2025-10-08T11:00:00-04:00');

        // Attendee data by host
        const hostData = {
            'Edmund Bogen': 21,
            'Seth Leader': 28,
            'Mark Wahl': 21,
            'Cliff Bernstein': 18
        };

        const totalAttendees = Object.values(hostData).reduce((a, b) => a + b, 0);

        // Update countdown timer
        function updateCountdown() {
            const now = new Date();
            const difference = eventDate - now;

            if (difference > 0) {
                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                document.getElementById('days').textContent = days;
                document.getElementById('hours').textContent = hours;
                document.getElementById('minutes').textContent = minutes;
                document.getElementById('seconds').textContent = seconds;
                document.getElementById('days-remaining').textContent = days;
            } else {
                document.getElementById('days').textContent = '0';
                document.getElementById('hours').textContent = '0';
                document.getElementById('minutes').textContent = '0';
                document.getElementById('seconds').textContent = '0';
                document.getElementById('days-remaining').textContent = '0';
            }
        }

        // Update countdown every second
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // Create pie chart
        const ctx = document.getElementById('attendeeChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: Object.keys(hostData),
                datasets: [{
                    data: Object.values(hostData),
                    backgroundColor: [
                        '#189ad3',
                        '#0d7aad',
                        '#444444',
                        '#5bb3db'
                    ],
                    borderWidth: 2,
                    borderColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            padding: 15,
                            font: {
                                size: window.innerWidth < 768 ? 12 : 14
                            }
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const label = context.label || '';
                                const value = context.parsed || 0;
                                const percentage = ((value / totalAttendees) * 100).toFixed(1);
                                return `${label}: ${value} attendees (${percentage}%)`;
                            }
                        }
                    }
                }
            }
        });

        // Create leaderboard
        const medals = ['🥇', '🥈', '🥉', '🏅'];
        const sortedHosts = Object.entries(hostData)
            .sort((a, b) => b[1] - a[1])
            .map((entry, index) => ({
                name: entry[0],
                count: entry[1],
                percentage: ((entry[1] / totalAttendees) * 100).toFixed(1),
                rank: index + 1,
                medal: medals[index] || '🏅'
            }));

        const leaderboardHTML = sortedHosts.map(host => `
            <div class="leader-item">
                <div style="display: flex; align-items: center;">
                    <span class="medal">${host.medal}</span>
                    <span class="leader-name">${host.name}</span>
                </div>
                <div>
                    <span class="leader-count">${host.count}</span>
                    <span class="leader-percentage">(${host.percentage}%)</span>
                </div>
            </div>
        `).join('');

        document.getElementById('leaderboard-items').innerHTML = leaderboardHTML;
    </script>
</body>
</html>
